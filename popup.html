<!DOCTYPE html>
<html>
  <head>
	<style>
		:root {
			--primary-color: #003554;
			--secondary-color: #F4FAFF;
		}

		body {
			font-family: 'Raleway', sans-serif;
			text-align: center;
		}

		button {
			font-size: 24px;
			font-weight: bold;
			padding: 10px;
			margin: 10px;
			border-radius: 15px;
			
			border-color: var(--primary-color);
			color: var(--secondary-color);
			box-shadow: 0 0 40px 40px var(--primary-color) inset, 0 0 0 0 var(--primary-color);
			transition: all 150ms ease-in-out;
			
			&:hover {
				box-shadow: 0 0 10px 0 var(--primary-color) inset, 0 0 10px 4px var(--primary-color);
				color: var(--primary-color);
			}
		}
		
	</style>
  </head>
  <body>
	<div>
		<button id="downloadButton">Download urls</button>
	</div>
	<div>
		<button id="uploadButton">Upload urls</button>
		<input type="file" id="uploadFile" accept=".json" style="display:none">
	</div>
	<div id="data">
	</div>
	<script src="./popup.js"></script>
  </body>
</html>
